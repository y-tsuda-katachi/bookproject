databases:
  - name: mysitedb
    plan: free
    databaseName: bookproject
    user: user
services:
  - type: web
    plan: free
    name: 本棚アプリ
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "python -m gunicorn bookproject.asgi:application -k uvicorn.workers.UvicornWorker"
    envVars:
      - key: DATABASE_URL
        fromDatabase: 
          name: mysitedb
          property: connectionsString
      - key: WEB_CONCURRENCY
        value: 4